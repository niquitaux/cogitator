<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generated Servo Skull Reference</title>
  <style>
    :root {
      --amber: #cf8417;
      --amber-bright: #f3b13d;
      --text: #dfba66;
      --text-dim: #826038;
      --line-bright: #a66714;
      --red: #c5481b;
      --accent-rgb: 207 132 23;
      --accent-bright-rgb: 243 177 61;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #050402;
      margin: 0;
    }

    .servo-skull {
      position: relative;
      width: 180px;
      height: 180px;
      display: grid;
      place-items: center;
      pointer-events: none;
      filter:
        drop-shadow(0 2px 2px rgba(0, 0, 0, 0.62))
        drop-shadow(0 0 12px rgb(var(--accent-bright-rgb) / 0.14));
      --eye-x: 0px;
      --eye-y: 0px;
    }

    .servo-skull svg {
      width: 150px;
      height: 150px;
      display: block;
      animation: skullHover 6s ease-in-out infinite;
    }

    .servo-bone {
      fill: color-mix(in srgb, var(--text) 38%, #171009);
      stroke: color-mix(in srgb, var(--amber) 68%, #100804);
      stroke-width: 1.25;
    }

    .servo-shadow {
      fill: rgba(0, 0, 0, 0.72);
    }

    .servo-plate {
      fill: rgb(var(--accent-rgb) / 0.18);
      stroke: rgb(var(--accent-bright-rgb) / 0.38);
      stroke-width: 0.8;
    }

    .servo-eye {
      transform-box: fill-box;
      transform-origin: center;
      transform: translate(var(--eye-x), var(--eye-y));
      transition: transform 80ms linear;
      filter: drop-shadow(0 0 4px rgb(var(--accent-bright-rgb) / 0.72));
    }

    @keyframes skullHover {
      0%, 100% { transform: translateY(0) rotate(-0.7deg); }
      50% { transform: translateY(-5px) rotate(0.7deg); }
    }
  </style>
</head>
<body>
  <div class="servo-skull" id="servo-skull" aria-label="Generated servo skull reference">
    <svg viewBox="0 0 120 120" role="img" aria-label="Generated servo skull reference">
      <defs>
        <radialGradient id="servo-bone-glow" cx="42%" cy="28%" r="72%">
          <stop offset="0%" stop-color="rgb(var(--accent-bright-rgb) / 0.34)"></stop>
          <stop offset="54%" stop-color="rgb(var(--accent-rgb) / 0.16)"></stop>
          <stop offset="100%" stop-color="rgba(0,0,0,0.18)"></stop>
        </radialGradient>
      </defs>
      <path d="M30 41 C29 20 43 10 60 10 C78 10 91 22 90 42 C99 48 101 62 95 73 C92 80 86 83 80 84 L76 98 C66 105 51 105 42 98 L39 84 C31 83 25 79 22 71 C17 59 20 48 30 41Z" class="servo-bone"></path>
      <path d="M32 41 C34 24 45 17 60 17 C74 17 84 26 85 42 C75 37 45 36 32 41Z" fill="url(#servo-bone-glow)" opacity="0.86"></path>
      <path d="M37 84 H83 L78 98 C67 104 52 104 42 98 Z" class="servo-bone"></path>
      <path d="M41 47 C47 39 58 42 59 52 C58 63 43 66 35 58 C34 53 36 49 41 47Z" class="servo-shadow"></path>
      <path d="M79 47 C73 39 62 42 61 52 C62 63 77 66 85 58 C86 53 84 49 79 47Z" class="servo-shadow"></path>
      <circle class="servo-eye" cx="47" cy="54" r="4.6" fill="var(--amber-bright)"></circle>
      <circle class="servo-eye" cx="73" cy="54" r="4.6" fill="var(--amber-bright)"></circle>
      <circle class="servo-eye" cx="47" cy="54" r="1.5" fill="#fff4b8" opacity="0.9"></circle>
      <circle class="servo-eye" cx="73" cy="54" r="1.5" fill="#fff4b8" opacity="0.9"></circle>
      <path d="M60 58 L53 75 H67 Z" class="servo-shadow"></path>
      <path d="M42 80 C50 86 70 86 78 80 L76 93 C68 98 52 98 44 93 Z" fill="rgba(0,0,0,0.24)" stroke="rgb(var(--accent-rgb) / 0.35)" stroke-width="0.8"></path>
      <path d="M47 82 V94 M54 84 V98 M61 84 V99 M68 84 V98 M75 82 V94" fill="none" stroke="var(--text-dim)" stroke-width="1.2" opacity="0.72"></path>
      <path d="M28 53 L12 45 L9 61 L26 65 Z M92 53 L108 45 L111 61 L94 65 Z" class="servo-plate"></path>
      <path d="M19 65 C13 76 20 88 34 87 M101 65 C107 76 100 88 86 87" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round" opacity="0.62"></path>
      <circle cx="31" cy="88" r="5" class="servo-shadow" stroke="var(--red)" stroke-width="1.2"></circle>
      <circle cx="89" cy="88" r="5" class="servo-shadow" stroke="var(--red)" stroke-width="1.2"></circle>
      <path d="M44 18 L36 3 M76 18 L84 3 M60 10 V0" fill="none" stroke="var(--line-bright)" stroke-width="1.3" stroke-linecap="round" opacity="0.58"></path>
      <circle cx="60" cy="4" r="3.2" fill="rgba(0,0,0,0.62)" stroke="var(--amber)" stroke-width="1.1"></circle>
    </svg>
  </div>

  <script>
    function updateServoSkullGaze(clientX, clientY) {
      const skull = document.getElementById("servo-skull");
      if (!skull) return;
      const rect = skull.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const angle = Math.atan2(clientY - centerY, clientX - centerX);
      const distance = Math.min(4.6, Math.hypot(clientX - centerX, clientY - centerY) / 58);
      skull.style.setProperty("--eye-x", `${Math.cos(angle) * distance}px`);
      skull.style.setProperty("--eye-y", `${Math.sin(angle) * distance}px`);
    }

    window.addEventListener("pointermove", (event) => {
      updateServoSkullGaze(event.clientX, event.clientY);
    });
  </script>
</body>
</html>
